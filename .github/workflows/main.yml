name: PR Build & Test Pipeline

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install MySQL Client
        run: sudo apt-get update && sudo apt-get install -y mysql-client

      - name: Wait for MySQL
        run: |
          echo "Waiting for MySQL..."
          for i in {1..20}; do
            mysql -h 127.0.0.1 -u root -proot -e "SELECT 1" && break
            sleep 3
          done

      - name: Setup Database
        run: |
          mysql -h 127.0.0.1 -u root -proot -e "DROP DATABASE IF EXISTS testing; CREATE DATABASE testing;"

      - name: Initialize Database
        run: |
          mysql -h 127.0.0.1 -u root -proot testing < src/test/resources/database/create.sql
          mysql -h 127.0.0.1 -u root -proot testing < src/test/resources/database/insertdata.sql

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Maven Tests
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/testing?useSSL=false&allowPublicKeyRetrieval=true
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root
        run: mvn clean test

      - name: Publish Test Report
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: target/surefire-reports/*.xml

      - name: Build JAR
        if: success()
        run: mvn package -DskipTests

      - name: Upload JAR Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: hr-application-build
          path: target/*.jar
          retention-days: 14